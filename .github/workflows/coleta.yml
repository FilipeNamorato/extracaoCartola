name: Coleta Cartola FC

on:
  schedule:
    - cron: "0 3 * * *"
    - cron: "0 13 * * *"
    - cron: "15 0 * * *"

  workflow_dispatch:

jobs:
  coletar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests pandas

      - name: Rodar extracao
        run: python cartola_extractor.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --cached --quiet || git commit -m "dados: coleta automatica $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
