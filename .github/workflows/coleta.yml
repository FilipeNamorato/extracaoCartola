name: Coleta Cartola FC

on:
  schedule:
    # 8h horário de Brasília = 11h UTC
    - cron: "0 9 * * *"     # 06h BRT
    - cron: "0 13 * * *"    # 10h BRT
    - cron: "40 15 * * *"   # 12h40 BRT
    - cron: "0 18 * * *"    # 15h BRT
    - cron: "0 20 * * *"    # 17h BRT
    - cron: "30 21 * * *"   # 18h30 BRT
    - cron: "0 23 * * *"    # 20h BRT
    - cron: "30 0 * * *"    # 21h30 BRT
    - cron: "0 2 * * *"     # 23h BRT

  workflow_dispatch:

jobs:
  coletar:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests pandas

      - name: Rodar extracao
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python cartola_extractor.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --cached --quiet || git commit -m "dados: coleta automatica $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push

      - name: Trigger Deploy Pages
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pages.yml',
              ref: 'main'
            })