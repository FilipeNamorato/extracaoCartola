name: Coleta Cartola FC

on:
  schedule:
    # 8h horário de Brasília = 11h UTC
    - cron: "0 13 * * *"   # 10h BRT
    - cron: "0 19 * * *"   # 16h BRT
    - cron: "10 21 * * *"  # 18h BRT

  workflow_dispatch:  # permite rodar manualmente pelo GitHub

jobs:
  coletar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests pandas

      - name: Rodar extração
        run: python cartola_extractor.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add data/
          git diff --cached --quiet || git commit -m "dados: coleta automatica $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push --force-with-lease origin main
